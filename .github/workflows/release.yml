name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute next version
        id: next
        run: |
          CURRENT=$(python3 -c "exec(open('version.py').read()); print(__version__)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $VERSION (${{ inputs.bump }})"

      - name: Update version files
        run: |
          VERSION="${{ steps.next.outputs.version }}"
          sed -i "s/^__version__ = .*/__version__ = \"${VERSION}\"/" version.py
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          sed -i "s/^VERSION=\".*\"/VERSION=\"${VERSION}\"/" install.sh
          echo "Updated to v${VERSION}"
          cat version.py
          grep '^version' pyproject.toml
          head -4 install.sh | tail -1

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.next.outputs.version }}"
          BRANCH="release/v${VERSION}"
          git checkout -b "$BRANCH"
          git add version.py pyproject.toml install.sh
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Bump version to ${VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "Release v${VERSION}" \
            --body "Bumps version to \`${VERSION}\` (\`${{ inputs.bump }}\` bump from \`${{ steps.next.outputs.current }}\`)." \
            --base main \
            --head "$BRANCH"
