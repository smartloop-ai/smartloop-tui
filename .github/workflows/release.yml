name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.1)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update version files
        run: |
          VERSION="${{ inputs.version }}"
          sed -i "s/^__version__ = .*/__version__ = \"${VERSION}\"/" version.py
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          sed -i "s/^VERSION=\".*\"/VERSION=\"${VERSION}\"/" install.sh
          sed -i "s/^smartloop==.*/smartloop==${VERSION}/" requirements.txt
          echo "Updated to v${VERSION}"
          cat version.py
          grep '^version' pyproject.toml
          head -4 install.sh | tail -1
          grep '^smartloop==' requirements.txt

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::error::Version is already ${VERSION}"
            exit 1
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          BRANCH="release/v${VERSION}"
          git checkout -b "$BRANCH"
          git add version.py pyproject.toml install.sh requirements.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Bump version to ${VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "Release v${VERSION}" \
            --body "Bumps version to \`${VERSION}\` in \`version.py\`, \`pyproject.toml\`, \`install.sh\`, and \`requirements.txt\`." \
            --base main \
            --head "$BRANCH"
